<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Bangkok Survival Kit</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111;
  --surface: #1a1a1a;
  --surface2: #222;
  --text: #f0f0f0;
  --text-dim: #999;
  --red: #e53935;
  --red-dark: #b71c1c;
  --blue: #1e88e5;
  --green: #43a047;
  --orange: #ff9800;
  --purple: #8e24aa;
  --pink: #e91e63;
  --radius: 16px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 18px;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen {
  display: none;
  min-height: 100vh;
  padding: 20px;
  padding-bottom: 40px;
}
.screen.active { display: flex; flex-direction: column; }

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 20px;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header-icon {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: var(--surface);
  border-radius: 12px;
  border: none;
  color: var(--text);
  cursor: pointer;
}

/* ── MAIN GRID ── */
.grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
  flex: 1;
}

.btn-feature {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 22px 20px;
  border-radius: var(--radius);
  border: none;
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: transform 0.1s, filter 0.1s;
  -webkit-user-select: none;
  user-select: none;
}
.btn-feature:active {
  transform: scale(0.97);
  filter: brightness(0.85);
}
.btn-feature .icon { font-size: 32px; flex-shrink: 0; }

.btn-panic {
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  padding: 32px 20px;
  font-size: 26px;
  justify-content: center;
  text-align: center;
  flex-direction: column;
  box-shadow: 0 4px 24px rgba(229,57,53,0.4);
}
.btn-panic .icon { font-size: 48px; }
.btn-panic .sub { font-size: 14px; font-weight: 400; opacity: 0.8; margin-top: 4px; }

.btn-where { background: var(--blue); }
.btn-home { background: var(--green); }
.btn-drinks { background: var(--orange); }
.btn-ladyboy { background: var(--pink); }

/* ── OVERLAYS ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  padding: 20px;
  flex-direction: column;
  overflow-y: auto;
}
.overlay.active { display: flex; }

.overlay-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 24px;
}
.btn-back {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: var(--surface);
  border-radius: 12px;
  border: none;
  color: var(--text);
  cursor: pointer;
}
.overlay-header h2 {
  font-size: 22px;
  font-weight: 700;
}

/* ── WHERE AM I ── */
.thai-address {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  margin: 20px 0;
}
.thai-address .addr {
  font-size: 28px;
  line-height: 1.5;
  font-weight: 700;
  word-break: break-word;
}
.thai-address .addr-en {
  font-size: 16px;
  color: var(--text-dim);
  margin-top: 12px;
}

.btn-action {
  display: block;
  width: 100%;
  padding: 18px;
  border-radius: var(--radius);
  border: none;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  color: #fff;
  margin-top: 12px;
  transition: transform 0.1s;
}
.btn-action:active { transform: scale(0.97); }
.btn-copy { background: var(--blue); }
.btn-grab { background: var(--green); }
.btn-gmaps { background: var(--blue); }
.btn-reset { background: var(--red); }

.status-msg {
  text-align: center;
  padding: 40px 20px;
  font-size: 20px;
  color: var(--text-dim);
}

/* ── WHERE JOKE ── */
.where-joke {
  font-size: 32px;
  font-weight: 900;
  text-align: center;
  color: var(--pink);
  padding: 20px 0 8px;
}
.where-sinon {
  font-size: 16px;
  color: var(--text-dim);
  text-align: center;
  font-style: italic;
  margin-bottom: 16px;
}
.where-map {
  width: 100%;
  height: 200px;
  border-radius: var(--radius);
  border: 2px solid var(--surface2);
  margin-bottom: 16px;
}
.where-no-gps {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 30px 16px;
  margin-bottom: 20px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 2px dashed var(--surface2);
}
.no-gps-icon { font-size: 48px; }
.no-gps-text {
  font-size: 16px;
  color: var(--text-dim);
  text-align: center;
  font-style: italic;
}
.btn-gps-enable {
  background: #ff9800 !important;
  color: #000 !important;
  font-weight: 800 !important;
}

/* ── TAKE ME HOME ── */
.home-joke {
  font-size: 28px;
  font-weight: 900;
  text-align: center;
  color: var(--pink);
  padding: 30px 0 8px;
}
.home-sub {
  font-size: 16px;
  color: var(--text-dim);
  text-align: center;
  font-style: italic;
  margin-bottom: 32px;
}
.home-buttons {
  display: flex;
  gap: 16px;
  padding: 0 16px;
}
.btn-ride {
  flex: 1;
  padding: 24px 12px;
  border: none;
  border-radius: var(--radius);
  font-size: 22px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: transform 0.15s;
}
.btn-ride:active { transform: scale(0.95); }
.ride-icon { font-size: 40px; }
.btn-grab {
  background: #00b14f;
  color: #fff;
}
.btn-bolt {
  background: #34d186;
  color: #000;
}

/* ── DRINKS ── */
.hell-banner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 20px 16px;
  margin-top: 12px;
  background: linear-gradient(135deg, #ff4444 0%, #cc0000 50%, #ff4444 100%);
  background-size: 200% 200%;
  animation: hellBg 2s ease infinite;
  border-radius: var(--radius);
  border: 2px solid #ff6666;
  overflow: hidden;
  position: relative;
}
@keyframes hellBg {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.hell-photo-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hell-photo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #fff;
  animation: hellShake 0.4s ease-in-out infinite;
  z-index: 1;
}
@keyframes hellShake {
  0%, 100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}
.hell-flames {
  position: absolute;
  font-size: 30px;
  line-height: 1;
  z-index: 0;
  animation: hellFloat 1s ease-in-out infinite;
}
.hell-flames.left { left: -30px; top: -5px; animation-delay: 0.2s; }
.hell-flames.right { right: -30px; top: -5px; animation-delay: 0.5s; }
.hell-flames.top { top: -25px; animation-delay: 0.8s; }
@keyframes hellFloat {
  0%, 100% { transform: translateY(0) scale(1); opacity: 1; }
  50% { transform: translateY(-8px) scale(1.2); opacity: 0.7; }
}
.hell-text {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  text-align: center;
  text-shadow: 0 0 10px rgba(255,200,0,0.6);
  animation: hellPulse 1.5s ease-in-out infinite;
}
@keyframes hellPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.hell-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.8);
  font-style: italic;
}
.hell-emojis {
  font-size: 20px;
  letter-spacing: 8px;
  animation: hellSpin 3s linear infinite;
}
@keyframes hellSpin {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}
.hell-reveal {
  animation: hellAppear 0.6s ease-out;
}
@keyframes hellAppear {
  from { opacity: 0; transform: translateY(20px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.category-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.category-info {
  flex: 1;
  min-width: 0;
}
.category-name {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.category-icon {
  font-size: 24px;
  flex-shrink: 0;
}
.category-icon img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
}
.category-count {
  font-size: 32px;
  font-weight: 800;
  min-width: 44px;
  text-align: center;
  flex-shrink: 0;
}
.category-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 2px;
}
.cat-btns {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.cat-btns button {
  width: 48px;
  height: 40px;
  border-radius: 10px;
  border: none;
  font-size: 22px;
  font-weight: 800;
  cursor: pointer;
  color: #fff;
  transition: transform 0.1s;
}
.cat-btns button:active { transform: scale(0.9); }
.cat-btn-minus { background: var(--red); }
.cat-btn-plus { background: var(--green); }

.grand-total {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  margin-top: 8px;
  border: 2px solid var(--orange);
}
.grand-total-amount {
  font-size: 36px;
  font-weight: 800;
  color: var(--orange);
}
.grand-total-eur {
  font-size: 18px;
  color: var(--text-dim);
  margin-top: 4px;
}
.grand-total-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── PANIC CONFIRM ── */
.panic-confirm {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: linear-gradient(180deg, #1a0a00 0%, #111 50%, #0a1a00 100%);
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.panic-confirm.active { display: flex; }
.panic-confirm-content {
  text-align: center;
  animation: drunkSway 3s ease-in-out infinite;
}
.panic-photo {
  width: 50vw;
  height: 50vw;
  border-radius: 50%;
  object-fit: cover;
  border: 5px solid var(--green);
  box-shadow: 0 0 60px rgba(67,160,71,0.5);
  animation: drunkPulse 2s ease-in-out infinite;
}
.panic-msg {
  font-size: 12vw;
  font-weight: 900;
  color: var(--green);
  margin-top: 24px;
  text-shadow: 0 0 30px rgba(67,160,71,0.6);
  letter-spacing: -1px;
  line-height: 1.1;
}
.panic-sub {
  font-size: 8vw;
  font-weight: 700;
  color: var(--text-dim);
  margin-top: 8px;
  animation: drunkBlink 1.5s ease-in-out infinite;
  font-style: italic;
}
@keyframes drunkSway {
  0%, 100% { transform: rotate(-2deg) translateX(-5px); }
  50% { transform: rotate(2deg) translateX(5px); }
}
@keyframes drunkPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes drunkBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── LADYBOY ── */
.ladyboy-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: #000;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.ladyboy-overlay.active { display: flex; }
.ladyboy-text {
  font-size: 30vw;
  font-weight: 900;
  color: #fff;
  animation: ladyboyFlash 0.3s infinite alternate;
}
@keyframes ladyboyFlash {
  0% { color: var(--pink); text-shadow: 0 0 40px var(--pink); }
  25% { color: #ffeb3b; text-shadow: 0 0 40px #ffeb3b; }
  50% { color: #00e5ff; text-shadow: 0 0 40px #00e5ff; }
  75% { color: var(--green); text-shadow: 0 0 40px var(--green); }
  100% { color: #ff5722; text-shadow: 0 0 40px #ff5722; }
}

/* ── SETTINGS ── */
.setting-group {
  margin-bottom: 24px;
}
.setting-group label {
  display: block;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.setting-group input {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: 2px solid var(--surface2);
  background: var(--surface);
  color: var(--text);
  font-size: 18px;
  outline: none;
}
.setting-group input:focus {
  border-color: var(--blue);
}
.btn-save {
  background: var(--green);
  margin-top: 12px;
}

/* ── GPS LOADING ── */
.spinner {
  display: inline-block;
  width: 28px;
  height: 28px;
  border: 3px solid var(--surface2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface2);
  color: var(--text);
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 600;
  z-index: 300;
  transition: transform 0.3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ════════ MAIN SCREEN ════════ -->
<div id="screen-main" class="screen active">
  <div class="header">
    <h1>Bangkok Survival Kit</h1>
    <button class="header-icon" onclick="showScreen('settings')" aria-label="Settings">&#9881;</button>
  </div>
  <div class="grid">
    <button class="btn-feature btn-panic" onclick="panicButton()">
      <span class="icon">&#128680;</span>
      PANIC BUTTON
      <span class="sub">Envoyer ta position par SMS</span>
    </button>
    <button class="btn-feature btn-where" onclick="showScreen('where')">
      <span class="icon">&#128205;</span>
      Ou suis-je ?
    </button>
    <button class="btn-feature btn-home" onclick="showHomeScreen()">
      <span class="icon">&#128662;</span>
      Ramene-moi
    </button>
    <button class="btn-feature btn-drinks" onclick="showScreen('drinks')">
      <span class="icon">&#127866;</span>
      Combien j'ai depense ?
    </button>
    <button class="btn-feature btn-ladyboy" onclick="showLadyboy()">
      <span class="icon">&#129300;</span>
      C'est un ladyboy ?
    </button>
  </div>
</div>

<!-- ════════ TAKE ME HOME ════════ -->
<div id="screen-home" class="overlay">
  <div class="overlay-header">
    <button class="btn-back" onclick="showScreen('main')">&#8592;</button>
    <h2>Ramene-moi</h2>
  </div>
  <div id="home-content">
    <div class="home-joke">Seul ou accompagne ?</div>
    <div class="home-sub">Le taxi, c'est le meme prix</div>
    <div class="home-buttons">
      <button class="btn-ride btn-grab" onclick="launchGrab()">
        <span class="ride-icon">&#128154;</span>
        Grab
      </button>
      <button class="btn-ride btn-bolt" onclick="launchBolt()">
        <span class="ride-icon">&#128993;</span>
        Bolt
      </button>
    </div>
  </div>
</div>

<!-- ════════ WHERE AM I ════════ -->
<div id="screen-where" class="overlay">
  <div class="overlay-header">
    <button class="btn-back" onclick="showScreen('main')">&#8592;</button>
    <h2>Ou suis-je ?</h2>
  </div>
  <div id="where-content">
    <div class="status-msg"><div class="spinner"></div><br>Recherche GPS...</div>
  </div>
</div>

<!-- ════════ DRINKS ════════ -->
<div id="screen-drinks" class="overlay">
  <div class="overlay-header">
    <button class="btn-back" onclick="showScreen('main')">&#8592;</button>
    <h2>Combien j'ai depense ?</h2>
    <button class="header-icon" onclick="showScreen('drinks-settings')" aria-label="Prix" style="margin-left:auto">&#9881;</button>
  </div>
  <div id="drinks-categories"></div>
  <div class="grand-total">
    <div class="grand-total-label">Total de la soiree</div>
    <div class="grand-total-amount" id="grand-total">0 THB</div>
    <div class="grand-total-eur" id="grand-total-eur">0 EUR</div>
  </div>
  <button class="btn-action btn-reset" onclick="resetDrinks()" style="margin-top:20px">Reset</button>
</div>

<!-- ════════ SETTINGS (urgence) ════════ -->
<div id="screen-settings" class="overlay">
  <div class="overlay-header">
    <button class="btn-back" onclick="showScreen('main')">&#8592;</button>
    <h2>Configurer</h2>
  </div>
  <div class="setting-group">
    <label>Numero d'urgence (SMS / WhatsApp)</label>
    <input type="tel" id="set-phone" placeholder="+66812345678">
  </div>
  <div class="setting-group">
    <label>Adresse hotel / domicile</label>
    <input type="text" id="set-hotel" placeholder="123 Sukhumvit Soi 11, Bangkok">
  </div>
  <button class="btn-action btn-save" onclick="saveSettings()">Sauvegarder</button>
</div>

<!-- ════════ SETTINGS (drinks) ════════ -->
<div id="screen-drinks-settings" class="overlay">
  <div class="overlay-header">
    <button class="btn-back" onclick="showScreen('drinks')">&#8592;</button>
    <h2>Prix</h2>
  </div>
  <div class="setting-group">
    <label>Prix d'un drink (THB)</label>
    <input type="number" id="set-price" placeholder="200">
  </div>
  <div class="setting-group">
    <label>Prix d'une barfine (THB)</label>
    <input type="number" id="set-barfine" placeholder="1000">
  </div>
  <div class="setting-group">
    <label>Prix d'un lady drink (THB)</label>
    <input type="number" id="set-ladydrink" placeholder="300">
  </div>
  <div class="setting-group">
    <label>Prix "Ladies... boy" (THB)</label>
    <input type="number" id="set-ladyboy" placeholder="2000">
  </div>
  <div class="setting-group">
    <label>Taux de change THB / EUR</label>
    <input type="number" id="set-rate" step="0.01" placeholder="0.026">
  </div>
  <button class="btn-action btn-save" onclick="saveDrinksSettings()">Sauvegarder</button>
</div>

<!-- ════════ PANIC CONFIRM ════════ -->
<div id="panic-confirm" class="panic-confirm" onclick="hidePanicConfirm()">
  <div class="panic-confirm-content">
    <img src="antho.jpg" class="panic-photo">
    <div class="panic-msg">Anthooo<br>will come...</div>
    <div class="panic-sub">...soooon</div>
  </div>
</div>

<!-- ════════ LADYBOY OVERLAY ════════ -->
<div id="ladyboy-overlay" class="ladyboy-overlay" onclick="hideLadyboy()">
  <div style="text-align:center">
    <img src="erwan.jpg" style="width:45vw;height:45vw;border-radius:50%;object-fit:cover;border:4px solid var(--pink);margin-bottom:20px;animation:ladyboyFlash 0.3s infinite alternate;box-shadow:0 0 40px rgba(233,30,99,0.6)">
    <div class="ladyboy-text">OUI</div>
  </div>
</div>

<!-- ════════ TOAST ════════ -->
<div id="toast" class="toast"></div>

<script>
// ── SETTINGS / STORAGE ──
const DEFAULTS = {
  phone: '',
  hotel: '',
  drinkPrice: 200,
  barfinePrice: 1000,
  ladydrinkPrice: 300,
  ladyboyPrice: 2000,
  rate: 0.026
};

function getSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('bkk-settings'));
    return { ...DEFAULTS, ...s };
  } catch { return { ...DEFAULTS }; }
}

function saveSettings() {
  const prev = getSettings();
  const s = {
    ...prev,
    phone: document.getElementById('set-phone').value.trim(),
    hotel: document.getElementById('set-hotel').value.trim(),
  };
  localStorage.setItem('bkk-settings', JSON.stringify(s));
  toast('Sauvegarde !');
  showScreen('main');
}

function saveDrinksSettings() {
  const prev = getSettings();
  const s = {
    ...prev,
    drinkPrice: parseFloat(document.getElementById('set-price').value) || DEFAULTS.drinkPrice,
    barfinePrice: parseFloat(document.getElementById('set-barfine').value) || DEFAULTS.barfinePrice,
    ladydrinkPrice: parseFloat(document.getElementById('set-ladydrink').value) || DEFAULTS.ladydrinkPrice,
    ladyboyPrice: parseFloat(document.getElementById('set-ladyboy').value) || DEFAULTS.ladyboyPrice,
    rate: parseFloat(document.getElementById('set-rate').value) || DEFAULTS.rate
  };
  localStorage.setItem('bkk-settings', JSON.stringify(s));
  toast('Prix sauvegardes !');
  showScreen('drinks');
}

function loadSettingsUI() {
  const s = getSettings();
  document.getElementById('set-phone').value = s.phone;
  document.getElementById('set-hotel').value = s.hotel;
}

function loadDrinksSettingsUI() {
  const s = getSettings();
  document.getElementById('set-price').value = s.drinkPrice;
  document.getElementById('set-barfine').value = s.barfinePrice;
  document.getElementById('set-ladydrink').value = s.ladydrinkPrice;
  document.getElementById('set-ladyboy').value = s.ladyboyPrice;
  document.getElementById('set-rate').value = s.rate;
}

// ── NAVIGATION ──
function showScreen(name) {
  document.querySelectorAll('.screen, .overlay').forEach(el => el.classList.remove('active'));
  if (name === 'main') {
    document.getElementById('screen-main').classList.add('active');
  } else if (name === 'settings') {
    loadSettingsUI();
    document.getElementById('screen-settings').classList.add('active');
  } else if (name === 'where') {
    document.getElementById('screen-where').classList.add('active');
    loadWhereAmI();
  } else if (name === 'drinks') {
    document.getElementById('screen-drinks').classList.add('active');
    updateDrinksUI();
  } else if (name === 'home') {
    document.getElementById('screen-home').classList.add('active');
  } else if (name === 'drinks-settings') {
    loadDrinksSettingsUI();
    document.getElementById('screen-drinks-settings').classList.add('active');
  }
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── GPS HELPER ──
function getPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('Geolocation non supportée'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
    );
  });
}

// ── 1. PANIC BUTTON ──
async function panicButton() {
  const s = getSettings();
  if (!s.phone) {
    toast('Configure ton numero dans ⚙️');
    return;
  }

  toast('Recherche GPS...');
  try {
    const pos = await getPosition();
    const mapUrl = `https://maps.google.com/?q=${pos.lat},${pos.lng}`;
    const msg = encodeURIComponent(`SOS — Je suis ici : ${mapUrl}`);
    const smsUrl = `sms:${s.phone}?body=${msg}`;
    window.location.href = smsUrl;

    // Show confirmation screen
    showPanicConfirm();

    // Fallback WhatsApp after 2s
    setTimeout(() => {
      const waPhone = s.phone.replace(/[^0-9]/g, '');
      const waUrl = `https://wa.me/${waPhone}?text=${msg}`;
      window.location.href = waUrl;
    }, 2000);
  } catch (err) {
    toast('Erreur GPS : ' + err.message);
  }
}

function showPanicConfirm() {
  document.getElementById('panic-confirm').classList.add('active');
}
function hidePanicConfirm() {
  document.getElementById('panic-confirm').classList.remove('active');
}

// ── 2. WHERE AM I ──
async function loadWhereAmI() {
  const container = document.getElementById('where-content');
  container.innerHTML = '<div class="status-msg"><div class="spinner"></div><br>Recherche GPS...</div>';

  try {
    const pos = await getPosition();

    // Reverse geocoding via Nominatim (free, no API key)
    let addrThai = `${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)}`;
    let addrEn = '';

    try {
      const resp = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${pos.lat}&lon=${pos.lng}&format=json&accept-language=th&addressdetails=1`,
        { headers: { 'User-Agent': 'BangkokSurvivalKit/1.0' } }
      );
      const data = await resp.json();
      if (data.display_name) addrThai = data.display_name;

      // Also get English version
      const resp2 = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${pos.lat}&lon=${pos.lng}&format=json&accept-language=en&addressdetails=1`,
        { headers: { 'User-Agent': 'BangkokSurvivalKit/1.0' } }
      );
      const data2 = await resp2.json();
      if (data2.display_name) addrEn = data2.display_name;
    } catch (e) {
      addrEn = 'Reverse geocoding indisponible';
    }

    container.innerHTML = `
      <div class="where-joke">Dans ton cul</div>
      <div class="where-sinon">sinon... ici :</div>
      <iframe class="where-map" src="https://maps.google.com/maps?q=${pos.lat},${pos.lng}&z=16&output=embed" frameborder="0" loading="lazy" allowfullscreen></iframe>
      <div class="thai-address">
        <div class="addr" id="thai-text">${addrThai}</div>
        <div class="addr-en">${addrEn}</div>
      </div>
      <button class="btn-action btn-copy" onclick="copyAddress()">Copier l'adresse</button>
      <button class="btn-action btn-gmaps" onclick="window.open('https://maps.google.com/?q=${pos.lat},${pos.lng}','_blank')" style="margin-top:12px">Ouvrir Google Maps</button>
    `;
  } catch (err) {
    container.innerHTML = `
      <div class="where-joke">Dans ton cul</div>
      <div class="where-sinon">sinon... aucune idee</div>
      <div class="where-no-gps">
        <div class="no-gps-icon">&#128225;</div>
        <div class="no-gps-text">GPS desactive, t'es perdu pour de vrai</div>
      </div>
      <button class="btn-action btn-gps-enable" onclick="window.open('intent://settings#Intent;scheme=android.settings;action=android.settings.LOCATION_SOURCE_SETTINGS;end','_blank'); setTimeout(()=>{ showScreen('main'); setTimeout(()=>showScreen('where'),300); },1000);">Activer le GPS</button>
      <button class="btn-action btn-gmaps" onclick="window.open('https://maps.google.com/','_blank')" style="margin-top:12px">Ouvrir Google Maps</button>
    `;
  }
}

function copyAddress() {
  const text = document.getElementById('thai-text')?.textContent;
  if (text && navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('Adresse copiée !')).catch(() => toast('Erreur copie'));
  } else {
    toast('Copie non disponible');
  }
}

// ── 3. TAKE ME HOME ──
function showHomeScreen() {
  const s = getSettings();
  if (!s.hotel) {
    toast('Configure ton adresse dans ⚙️');
    return;
  }
  showScreen('home');
  yellErwan();
}

function yellErwan() {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  for (let i = 0; i < 3; i++) {
    const u = new SpeechSynthesisUtterance('Erwaaaaan!');
    u.lang = 'th-TH';
    u.rate = 0.6;
    u.pitch = 0.3;
    u.volume = 1;
    speechSynthesis.speak(u);
  }
}

async function launchGrab() {
  const s = getSettings();
  const dropoff = encodeURIComponent(s.hotel);
  try {
    const pos = await getPosition();
    window.location.href = `grab://open?screenType=BOOKING&pickupLatLng=${pos.lat},${pos.lng}&dropoffAddress=${dropoff}`;
  } catch {
    window.location.href = `grab://open?screenType=BOOKING&dropoffAddress=${dropoff}`;
  }
}

async function launchBolt() {
  const s = getSettings();
  try {
    const pos = await getPosition();
    // Bolt deep link
    window.location.href = `bolt://ride?pickup_lat=${pos.lat}&pickup_lng=${pos.lng}&dropoff_name=${encodeURIComponent(s.hotel)}`;
    // Fallback to Bolt web
    setTimeout(() => {
      window.open(`https://m.bolt.eu`, '_blank');
    }, 1500);
  } catch {
    window.open(`https://m.bolt.eu`, '_blank');
  }
}

// ── 4. DRINKS COUNTER ──
const categories = [
  { id: 'drink',    name: 'Drinks',                  icon: '&#127866;', priceKey: 'drinkPrice',    count: 0 },
  { id: 'ladydrink',name: 'Lady Drink',              icon: '&#127864;', priceKey: 'ladydrinkPrice',count: 0 },
  { id: 'barfine',  name: 'Barfine',                 icon: '&#128176;', priceKey: 'barfinePrice',  count: 0 },
  { id: 'ladyboy',  name: 'Ladies... boy',           icon: '&#127825;', priceKey: 'ladyboyPrice',  count: 0 },
];

function changeCategory(id, delta) {
  const cat = categories.find(c => c.id === id);
  if (cat) cat.count = Math.max(0, cat.count + delta);
  updateDrinksUI();
}

function resetDrinks() {
  categories.forEach(c => c.count = 0);
  updateDrinksUI();
  toast('Compteur remis a zero !');
}

function updateDrinksUI() {
  const s = getSettings();
  const container = document.getElementById('drinks-categories');
  let grandTotal = 0;

  const normalCats = categories.filter(c => c.id !== 'hell');

  container.innerHTML = normalCats.map(cat => {
    const price = s[cat.priceKey] || 0;
    const subtotal = cat.count * price;
    grandTotal += subtotal;
    return `
      <div class="category-row">
        <span class="category-icon">${cat.icon}</span>
        <div class="category-info">
          <div class="category-name">${cat.name}</div>
          <div class="category-sub">${price.toLocaleString()} THB x ${cat.count} = ${subtotal.toLocaleString()} THB</div>
        </div>
        <div class="category-count">${cat.count}</div>
        <div class="cat-btns">
          <button class="cat-btn-plus" onclick="changeCategory('${cat.id}',1)">+</button>
          <button class="cat-btn-minus" onclick="changeCategory('${cat.id}',-1)">&minus;</button>
        </div>
      </div>`;
  }).join('');

  if (grandTotal > 5000) {
    container.innerHTML += `
      <div class="hell-banner hell-reveal">
        <div class="hell-photo-wrap">
          <span class="hell-flames left">&#128293;</span>
          <img src="erwan.jpg" class="hell-photo" alt="Erwan">
          <span class="hell-flames right">&#128293;</span>
          <span class="hell-flames top">&#128293;</span>
        </div>
        <div class="hell-text">Hell what did I do???</div>
        <div class="hell-sub">T'es pas bien Erwan...</div>
        <div class="hell-emojis">&#128184;&#128172;&#129326;&#128561;</div>
      </div>`;
  }

  const eur = (grandTotal * s.rate).toFixed(2);
  document.getElementById('grand-total').textContent = grandTotal.toLocaleString() + ' THB';
  document.getElementById('grand-total-eur').textContent = eur + ' EUR';
}
